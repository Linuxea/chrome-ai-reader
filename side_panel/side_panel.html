<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小🍐子阅读助手</title>
  <link rel="stylesheet" href="side_panel.css">
  <link rel="stylesheet" href="history.css">
  <link rel="stylesheet" href="quick-commands.css">
</head>
<body>
  <div class="container">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1 class="header-title">小🍐子</h1>
      <div class="header-actions">
        <button id="historyBtn" class="icon-btn" title="历史对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </button>
        <button id="newChatBtn" class="icon-btn" title="新建聊天">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="exportBtn" class="icon-btn" title="导出聊天记录">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <button id="themeToggleBtn" class="icon-btn" title="切换夜间模式">
          <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
          </svg>
          <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
    </header>

    <!-- 历史对话面板 -->
    <div id="historyPanel" class="history-panel hidden">
      <div class="history-header">
        <button id="historyBackBtn" class="icon-btn" title="返回">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <span class="history-title">历史对话</span>
      </div>
      <div id="historyList" class="history-list">
        <div class="history-empty">暂无历史对话</div>
      </div>
    </div>

    <!-- 快捷操作区 -->
    <div class="quick-actions">
      <button class="action-btn" data-action="summarize">
        <span class="action-icon">📋</span>
        <span>总结</span>
      </button>
      <button class="action-btn" data-action="translate">
        <span class="action-icon">🌐</span>
        <span>翻译</span>
      </button>
      <button class="action-btn" data-action="keyInfo">
        <span class="action-icon">🔑</span>
        <span>关键信息</span>
      </button>
    </div>

    <!-- 对话区域 -->
    <div id="chatArea" class="chat-area">
      <div class="welcome-msg">
        <p>打开任意网页，点击上方按钮或输入问题开始使用。</p>
      </div>
    </div>

    <!-- 底部输入区 -->
    <div class="input-area">
      <div id="quotePreview" class="quote-preview hidden">
        <span class="quote-text" id="quoteText"></span>
        <button class="quote-close" id="quoteClose" title="清除引用" aria-label="清除引用">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="input-wrapper">
        <div id="commandPopup" class="command-popup hidden"></div>
        <textarea id="userInput" placeholder="输入问题，基于当前页面内容回答..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn" title="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div id="modelStatusBar" class="model-status-bar">当前模型：deepseek-chat</div>
    </div>
  </div>

  <script src="../libs/marked.min.js"></script>
  <script src="chat-history.js"></script>
  <script src="quick-commands.js"></script>
  <script src="ui-helpers.js"></script>
  <script src="tts-streaming.js"></script>
  <script src="side_panel.js"></script>
</body>
</html>
