<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 阅读助手</title>
  <link rel="stylesheet" href="side_panel.css">
</head>
<body>
  <div class="container">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1 class="header-title">AI 阅读助手</h1>
      <div class="header-actions">
        <button id="historyBtn" class="icon-btn" title="历史对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </button>
        <button id="newChatBtn" class="icon-btn" title="新建聊天">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- 历史对话面板 -->
    <div id="historyPanel" class="history-panel hidden">
      <div class="history-header">
        <button id="historyBackBtn" class="icon-btn" title="返回">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <span class="history-title">历史对话</span>
      </div>
      <div id="historyList" class="history-list">
        <div class="history-empty">暂无历史对话</div>
      </div>
    </div>

    <!-- 快捷操作区 -->
    <div class="quick-actions">
      <button class="action-btn" data-action="summarize">
        <span class="action-icon">📋</span>
        <span>总结页面</span>
      </button>
      <button class="action-btn" data-action="translate">
        <span class="action-icon">🌐</span>
        <span>翻译</span>
      </button>
      <button class="action-btn" data-action="keyInfo">
        <span class="action-icon">🔑</span>
        <span>关键信息</span>
      </button>
    </div>

    <!-- 对话区域 -->
    <div id="chatArea" class="chat-area">
      <div class="welcome-msg">
        <p>打开任意网页，点击上方按钮或输入问题开始使用。</p>
      </div>
    </div>

    <!-- 底部输入区 -->
    <div class="input-area">
      <div id="quotePreview" class="quote-preview hidden">
        <span class="quote-text" id="quoteText"></span>
        <button class="quote-close" id="quoteClose" title="清除引用" aria-label="清除引用">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="输入问题，基于当前页面内容回答..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn" title="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="../libs/marked.min.js"></script>
  <script src="side_panel.js"></script>
</body>
</html>
