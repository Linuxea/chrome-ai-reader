<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小🍐子阅读助手 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>小🍐子阅读助手设置</h1>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      <p class="hint">你的 API Key 仅保存在本地浏览器中，不会发送到任何第三方服务器。</p>
    </div>

    <div class="form-group">
      <label for="apiBase">API 地址（可选）</label>
      <input type="text" id="apiBase" placeholder="https://api.deepseek.com">
      <p class="hint">留空使用默认地址（DeepSeek）。如需使用其他兼容接口，可在此填写。</p>
    </div>

    <div class="form-group">
      <label for="modelName">模型名称</label>
      <div class="model-input-row">
        <input type="text" id="modelName" list="model-list" placeholder="点击刷新按钮获取可用模型，或手动输入模型名称">
        <button id="refreshModelsBtn" class="refresh-btn" type="button">刷新模型列表</button>
      </div>
      <datalist id="model-list"></datalist>
      <p class="hint">选择或输入要使用的模型名称。点击刷新按钮从当前 API 地址获取可用模型列表。</p>
    </div>

    <div class="form-group">
      <label for="systemPrompt">自定义 System Prompt（可选）</label>
      <textarea id="systemPrompt" rows="4" placeholder="例如：请用简洁的中文回答，回答时附带原文引用"></textarea>
      <p class="hint">追加到默认 prompt 之后，用于个性化 AI 的回答风格或行为。留空则使用默认设置。</p>
    </div>

    <div class="form-group">
      <label>快捷指令</label>
      <p class="hint">配置快捷指令后，在聊天框输入 <code>/</code> 即可快速调用。</p>
      <div id="quickCommandsList" class="quick-commands-list"></div>
      <button id="addCommandBtn" class="add-command-btn" type="button">+ 添加指令</button>
    </div>

    <button id="saveBtn" class="save-btn">保存设置</button>
    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
